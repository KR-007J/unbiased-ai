name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ['Test & Build']
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: 18.x
  DEPLOY_ENV: production

jobs:
  security-gate:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Check test results
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "❌ Tests failed - blocking deployment"
            exit 1
          fi

      - name: Security approval gate
        run: |
          echo "✅ Security checks passed - proceeding with deployment"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: security-gate
    if: success()

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit

      - name: Build application for production
        working-directory: ./frontend
        run: npm run build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets['FIREBASE_API_KEY'] }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets['FIREBASE_AUTH_DOMAIN'] }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets['FIREBASE_PROJECT_ID'] }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets['FIREBASE_STORAGE_BUCKET'] }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['FIREBASE_MESSAGING_SENDER_ID'] }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets['FIREBASE_APP_ID'] }}
          REACT_APP_SUPABASE_URL: ${{ secrets['SUPABASE_URL'] }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets['SUPABASE_ANON_KEY'] }}
          REACT_APP_BACKEND_URL: ${{ secrets['BACKEND_URL'] }}
          REACT_APP_SENTRY_DSN: ${{ secrets['SENTRY_DSN'] }}
          REACT_APP_MIXPANEL_TOKEN: ${{ secrets['MIXPANEL_TOKEN'] }}
          REACT_APP_VERSION: ${{ github.sha }}
          REACT_APP_BUILD_TIME: ${{ github.event.head_commit.timestamp }}

      - name: Optimize build artifacts
        working-directory: ./frontend
        run: |
          # Compress static assets
          find build -type f \( -name "*.js" -o -name "*.css" \) -exec gzip -9 -k {} \;
          # Generate SRI hashes for security
          npm install -g sri-hash
          find build -name "*.js" -exec sh -c 'echo "$(basename "$1" .js): $(sri-hash "$1")"' _ {} \;

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets['GITHUB_TOKEN'] }}'
          firebaseServiceAccount: '${{ secrets['FIREBASE_SERVICE_ACCOUNT'] }}'
          channelId: live
          projectId: ${{ secrets['FIREBASE_PROJECT_ID'] }}
          entryPoint: ./frontend

      - name: Invalidate CDN cache (if using CDN)
        run: |
          # Add CDN invalidation commands here if using CloudFlare, AWS CloudFront, etc.
          echo "CDN cache invalidation would happen here"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: security-gate
    if: success()

    steps:
      - uses: actions/checkout@v3

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Validate Supabase functions
        working-directory: ./supabase
        run: |
          # Check function syntax and dependencies
          for func in functions/*/; do
            if [ -f "${func}index.ts" ]; then
              echo "Validating ${func}..."
              deno check "${func}index.ts" || exit 1
            fi
          done

      - name: Deploy Supabase functions
        working-directory: ./supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
          SUPABASE_PROJECT_ID: ${{ secrets['SUPABASE_PROJECT_ID'] }}
        run: |
          # Deploy functions with rollback capability
          FUNCTIONS="detect-bias rewrite compare analyze chat web-scan forecast-bias batch-analyze"
          for func in $FUNCTIONS; do
            echo "Deploying $func..."
            supabase functions deploy $func --no-verify-jwt || exit 1
          done

      - name: Run database migrations safely
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets['SUPABASE_DB_PASSWORD'] }}
        run: |
          # Create backup before migrations
          echo "Creating database backup..."
          # Add backup logic here

          # Run migrations with rollback capability
          echo "Running database migrations..."
          # Add migration logic here

      - name: Update secrets and environment variables
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
          SUPABASE_PROJECT_ID: ${{ secrets['SUPABASE_PROJECT_ID'] }}
        run: |
          # Update environment secrets securely
          supabase secrets set GEMINI_API_KEY=${{ secrets['GEMINI_API_KEY'] }} --project-ref $SUPABASE_PROJECT_ID
          supabase secrets set REDIS_URL=${{ secrets['REDIS_URL'] }} --project-ref $SUPABASE_PROJECT_ID
          supabase secrets set SENTRY_DSN=${{ secrets['SENTRY_DSN'] }} --project-ref $SUPABASE_PROJECT_ID

  post-deployment-tests:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: success()

    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Health check - Frontend
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s https://unbiased-ai-krish-6789.web.app > /dev/null; then
              echo "✅ Frontend is healthy"
              break
            else
              echo "⏳ Waiting for frontend to be ready... (attempt $((RETRY_COUNT+1)))"
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            fi
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "❌ Frontend health check failed"
            exit 1
          fi

      - name: Health check - Backend functions
        run: |
          FUNCTIONS="detect-bias rewrite compare analyze chat web-scan"
          for func in $FUNCTIONS; do
            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s -H "Authorization: Bearer ${{ secrets['SUPABASE_ANON_KEY'] }}" \
                https://${{ secrets['SUPABASE_PROJECT_ID'] }}.supabase.co/functions/v1/$func > /dev/null; then
                echo "✅ $func is healthy"
                break
              else
                echo "⏳ Waiting for $func to be ready... (attempt $((RETRY_COUNT+1)))"
                sleep 5
                RETRY_COUNT=$((RETRY_COUNT+1))
              fi
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ $func health check failed"
              exit 1
            fi
          done

      - name: Smoke test API endpoints
        run: |
          # Test basic functionality
          DETECT_RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets['SUPABASE_ANON_KEY'] }}" \
            -d '{"content": "Test content for bias detection", "type": "text"}' \
            https://${{ secrets['SUPABASE_PROJECT_ID'] }}.supabase.co/functions/v1/detect-bias)

          if echo "$DETECT_RESPONSE" | jq -e '.success' > /dev/null; then
            echo "✅ API smoke test passed"
          else
            echo "❌ API smoke test failed"
            echo "Response: $DETECT_RESPONSE"
            exit 1
          fi

      - name: Performance check post-deployment
        run: |
          # Check response times
          START_TIME=$(date +%s%3N)
          curl -s https://unbiased-ai-krish-6789.web.app > /dev/null
          END_TIME=$(date +%s%3N)
          RESPONSE_TIME=$((END_TIME - START_TIME))

          if [ $RESPONSE_TIME -gt 3000 ]; then
            echo "⚠️ Slow response time: ${RESPONSE_TIME}ms"
          else
            echo "✅ Response time acceptable: ${RESPONSE_TIME}ms"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, post-deployment-tests]
    if: always()

    steps:
      - name: Generate deployment report
        run: |
          DEPLOYMENT_STATUS="✅"
          if [ "${{ needs.deploy-frontend.result }}" != "success" ] || [ "${{ needs.deploy-backend.result }}" != "success" ]; then
            DEPLOYMENT_STATUS="❌"
          fi

          if [ "${{ needs.post-deployment-tests.result }}" != "success" ]; then
            DEPLOYMENT_STATUS="⚠️"
          fi

          echo "DEPLOYMENT_STATUS=$DEPLOYMENT_STATUS" >> $GITHUB_ENV

      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1.24.0
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets['SLACK_WEBHOOK'] }}
        with:
          payload: |
            {
              "text": "✅ Unbiased AI Production Deployment Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Deployment Status*: ✅ Successful\n*Environment*: Production\n*Commit*: `${{ github.sha }}`\n*Author*: ${{ github.actor }}\n*Timestamp*: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Frontend*\n✅ Deployed to Firebase"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Backend*\n✅ Functions deployed"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Health Checks*\n✅ All systems operational"
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1.24.0
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets['SLACK_WEBHOOK'] }}
        with:
          payload: |
            {
              "text": "❌ Unbiased AI Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 Deployment Status*: ❌ Failed\n*Environment*: Production\n*Commit*: `${{ github.sha }}`\n*Author*: ${{ github.actor }}\n*Logs*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Failed Jobs*:\n${{ needs.deploy-frontend.result != 'success' && '• Frontend Deployment\n' || '' }}${{ needs.deploy-backend.result != 'success' && '• Backend Deployment\n' || '' }}${{ needs.post-deployment-tests.result != 'success' && '• Health Checks\n' || '' }}"
                  }
                }
              ]
            }

      - name: Create deployment tag
        if: success()
        run: |
          git tag "v$(date +%Y%m%d-%H%M%S)-${{ github.sha }}" ${{ github.sha }}
          git push origin "v$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"

  rollback:
    runs-on: ubuntu-latest
    needs: [notify]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Revert Firebase Hosting Deployment
        run: |
          echo "🚨 Deployment failure detected. Rolling back to last stable version..."
          firebase hosting:rollback --project ${{ secrets['FIREBASE_PROJECT_ID'] }} -y --token ${{ secrets['FIREBASE_TOKEN'] }}
        continue-on-error: true

      - name: Notify Rollback
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets['SLACK_WEBHOOK'] }}
        with:
          payload: |
            {
              "text": "🚨 Automatic Rollback Triggered for Unbiased AI Production"
            }
